version: '3.8'

services:
  # Kong API Gateway
  kong:
    image: kong:latest
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_ADMIN_LISTEN: "0.0.0.0:8001" 
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    ports:
      - "8000:8000"   # API Gateway
      - "8001:8001"   # Admin API
    volumes:
      - ./kong-config:/usr/local/kong/declarative
    networks:
      - ecommerce-network
    depends_on:
      - user-service

  user-service:
    build: ./services/user_service
    container_name: user-service
    ports:
      - "8080:8080"
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge
