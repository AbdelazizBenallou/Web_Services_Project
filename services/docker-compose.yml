version: '3.8'
services:
  # قاعدة بيانات user_service
  user_db:
    image: postgres:17
    environment:
      POSTGRES_USER: amine
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - user_data:/var/lib/postgresql/data
      - ./init-scripts/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh

  # قاعدة بيانات product_service
  product_db:
    image: postgres:17
    environment:
      POSTGRES_USER: product
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: productdb
    ports:
      - "5433:5432"
    volumes:
      - product_data:/var/lib/postgresql/data
      - ./init-scripts/init-product-db.sh:/docker-entrypoint-initdb.d/init-product-db.sh

  # user_service
  user_service:
    build: ./user_service
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://amine:secret@user_db:5432/userdb?sslmode=disable
    depends_on:
      - user_db

  # product_service
  product_service:
    build: ./product_service
    ports:
      - "8081:8080"
    environment:
      - DATABASE_URL=postgres://product:secret@product_db:5432/productdb?sslmode=disable
    depends_on:
      - product_db

volumes:
  user_data:
  product_data:
