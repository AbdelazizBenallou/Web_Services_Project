services:

  # --------------------------
  # Kong API Gateway
  # --------------------------
  kong:
    image: kong:latest
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    ports:
      - "8000:8000"   # المستخدمون يصلون هنا فقط
      - "8001:8001"   # لوحة الإدارة
    volumes:
      - ../kong-config:/usr/local/kong/declarative
    depends_on:
      - user_service
      - product_service
      - order_service
    networks:
      - microservices-network

  # --------------------------
  # Databases
  # --------------------------
  user_db:
    image: postgres:17
    environment:
      POSTGRES_USER: amine
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: userdb
    volumes:
      - user_data:/var/lib/postgresql/data
      - ./init-scripts/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
    networks:
      - microservices-network

  product_db:
    image: postgres:17
    environment:
      POSTGRES_USER: product
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: productdb
    volumes:
      - product_data:/var/lib/postgresql/data
      - ./init-scripts/init-product-db.sh:/docker-entrypoint-initdb.d/init-product-db.sh
    networks:
      - microservices-network

  order_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orderdb
    volumes:
      - order_data:/var/lib/postgresql/data
      - ./order_service/migrations:/docker-entrypoint-initdb.d
    networks:
      - microservices-network

  # --------------------------
  # Microservices (no external ports)
  # --------------------------
  user_service:
    build: ./user_service
    environment:
      - DATABASE_URL=postgres://amine:secret@user_db:5432/userdb?sslmode=disable
    depends_on:
      - user_db
    networks:
      - microservices-network

  product_service:
    build: ./product_service
    environment:
      - DATABASE_URL=postgres://product:secret@product_db:5432/productdb?sslmode=disable
    depends_on:
      - product_db
    networks:
      - microservices-network

  order_service:
    build: ./order_service
    environment:
      - DB_HOST=order_db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=orderdb
    depends_on:
      - order_db
    networks:
      - microservices-network

# --------------------------
# Volumes
# --------------------------
volumes:
  user_data:
  product_data:
  order_data:

# --------------------------
# Network
# --------------------------
networks:
  microservices-network:
    driver: bridge
