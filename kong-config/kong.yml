_format_version: "3.0"


services:

  - name: user-service
    url: http://user_service:8080
    routes:
      - name: user-routes
        paths: ["/api/v1/users"]
        strip_path: false

  - name: product-service
    url: http://product_service:8080
    routes:
      - name: product-routes
        paths: ["/api/v1/products"]
        strip_path: false
